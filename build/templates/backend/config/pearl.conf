{{define "main" -}}
[Application Options]
nofilelogging=1
notls=1
txindex=1
addrindex=1
rpcuser={{.IPC.RPCUser}}
rpcpass={{.IPC.RPCPass}}
rpclisten=127.0.0.1:{{.Ports.BackendRPC}}
{{if .Backend.Mainnet}}{{else}}testnet=1{{end}}
{{- if .Backend.AdditionalParams}}
# generated from additional_params
{{- range $name, $value := .Backend.AdditionalParams}}
{{$name}}={{$value}}
{{- end}}
{{- end}}
{{ end }}


