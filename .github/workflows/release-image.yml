name: Release Image

# Builds the environment-independent Blockbook container image from this
# checkout and pushes it to this fork's GHCR (ghcr.io/<owner>/blockbook).
# Manual only — a release is an explicit, human-triggered action.
#
# Like upstream, it is a single image for all networks: the blockchaincfg is
# supplied at run time (-blockchaincfg), never baked in. Consumers pin the
# short-sha tag; :latest tracks the most recent release.
#
# One-time setup: after the first push, make the GHCR `blockbook` package
# public (Packages -> blockbook -> Package settings -> Change visibility), so
# clusters pull it with no imagePullSecret (matching pearld's public GHCR image).

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push the image to GHCR"
        required: true
        type: boolean
        default: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/blockbook

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push blockbook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Calculate image tag
        id: tag
        run: echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # `make build` builds the blockbook-build image (the runtime layer's FROM)
      # and compiles the binary into build/blockbook.
      - name: Build blockbook binary
        run: make build BASE_IMAGE=debian:11

      - name: Build runtime image
        run: |
          # Small assembled context so repo-level ignore rules can't exclude
          # build/* and so the runtime FROM resolves against the just-built image.
          rm -rf runtime_ctx && mkdir runtime_ctx
          cp build/docker/runtime/Dockerfile runtime_ctx/Dockerfile
          cp build/blockbook runtime_ctx/blockbook
          cp -R static runtime_ctx/static
          docker build --platform linux/amd64 -f runtime_ctx/Dockerfile \
            -t "${IMAGE_NAME}:${{ steps.tag.outputs.sha }}" \
            -t "${IMAGE_NAME}:latest" runtime_ctx

      - name: Push image
        if: ${{ inputs.push }}
        run: docker push --all-tags "${IMAGE_NAME}"

      - name: Summary
        run: |
          {
            echo "### Blockbook image"
            echo "- source: \`${GITHUB_REPOSITORY}\` @ \`${GITHUB_REF_NAME}\`"
            echo "- image: \`${IMAGE_NAME}:${{ steps.tag.outputs.sha }}\` (+ \`:latest\`)"
            echo "- pushed: ${{ inputs.push }}"
          } >> "$GITHUB_STEP_SUMMARY"
