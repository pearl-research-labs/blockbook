name: Release Image

# Multi-arch (amd64 + arm64) container image, pushed to this repo's GHCR.
# Each arch builds natively: the CGO/RocksDB binary is impractical to
# cross-compile. After the first push, make the GHCR package public.

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push the image to GHCR"
        required: true
        type: boolean
        default: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/blockbook

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Calculate image tag
        id: tag
        run: echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build blockbook binary
        run: make build BASE_IMAGE=debian:11

      # Standalone context: .gitignore-style rules can't exclude build/*.
      - name: Assemble runtime build context
        run: |
          rm -rf runtime_ctx && mkdir runtime_ctx
          cp build/docker/runtime/Dockerfile runtime_ctx/Dockerfile
          cp build/blockbook runtime_ctx/blockbook
          cp -R static runtime_ctx/static

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
        with:
          # host image store, so FROM blockbook-build:latest resolves
          driver: docker

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: runtime_ctx
          file: runtime_ctx/Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ inputs.push }}

      - name: Export digest
        if: ${{ inputs.push }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        if: ${{ inputs.push }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge multi-arch manifest
    if: ${{ inputs.push }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.build.outputs.sha }}
            type=raw,value=latest

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Summary
        run: |
          {
            echo "### Blockbook image (amd64 + arm64)"
            echo "- \`${IMAGE_NAME}:${{ needs.build.outputs.sha }}\` (+ \`:latest\`)"
          } >> "$GITHUB_STEP_SUMMARY"
