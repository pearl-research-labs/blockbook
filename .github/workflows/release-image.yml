name: Release Image

# Manually build and publish the multi-arch Blockbook image to GHCR.

on:
  workflow_dispatch:
    inputs:
      push:
        description: "Push the image to GHCR"
        required: true
        type: boolean
        default: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/blockbook

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Calculate image tag
        id: tag
        run: echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build blockbook binary
        run: make build BASE_IMAGE=debian:11

      # Standalone context: .gitignore-style rules can't exclude build/*.
      - name: Assemble runtime build context
        run: |
          rm -rf runtime_ctx && mkdir runtime_ctx
          cp build/docker/runtime/Dockerfile runtime_ctx/Dockerfile
          cp build/blockbook runtime_ctx/blockbook
          cp -R static runtime_ctx/static

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Default (docker driver) builder: FROM blockbook-build:latest must
      # resolve from the host image store, which rules out push-by-digest —
      # each arch pushes a tag and the merge job combines them.
      - name: Build and push arch image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: runtime_ctx
          file: runtime_ctx/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ inputs.push }}
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha }}-${{ matrix.arch }}

  merge:
    name: Merge multi-arch manifest
    if: ${{ inputs.push }}
    needs: build
    runs-on: ubuntu-latest
    env:
      SHA: ${{ needs.build.outputs.sha }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t "$IMAGE_NAME:$SHA" -t "$IMAGE_NAME:latest" \
            "$IMAGE_NAME:$SHA-amd64" "$IMAGE_NAME:$SHA-arm64"

      - name: Verify manifest
        run: docker buildx imagetools inspect "$IMAGE_NAME:$SHA"
